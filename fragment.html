<style>
  :root {
    --bg: #f7f3ee;
    --bg2: #f0ebe3;
    --bg3: #e6dfd5;
    --white: #fdfaf6;
    --ink: #1e1a16;
    --ink-mid: #4a4238;
    --ink-soft: #9a8e82;
    --amber: #b8935a;
    --amber-light: #f5e8d4;
    --amber-dark: #8a6a38;
    --teal: #4a8c7c;
    --teal-light: #e0f0eb;
    --rose: #c07070;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #f7f3ee; --bg2: #f0ebe3; --bg3: #e6dfd5;
      --white: #fdfaf6; --ink: #1e1a16; --ink-mid: #4a4238;
      --ink-soft: #9a8e82; --amber: #b8935a; --amber-light: #f5e8d4;
      --amber-dark: #8a6a38; --teal: #4a8c7c; --teal-light: #e0f0eb; --rose: #c07070;
    }
    html, body { background: #f7f3ee !important; color: #1e1a16 !important; }
    input, textarea, button { color-scheme: light; }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: var(--bg); }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    color-scheme: light;
  }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--bg3);
    padding: calc(var(--safe-top) + 14px) 20px 12px;
  }

  .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }

  .header-title {
    font-family: 'Lora', serif;
    font-size: 20px; font-weight: 400; font-style: italic;
    color: var(--ink); letter-spacing: 0.01em;
  }

  .header-title em { font-style: normal; color: var(--amber); }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .version-badge {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300;
    color: var(--ink-soft); background: var(--bg2); border: 1px solid var(--bg3);
    border-radius: 4px; padding: 2px 7px; letter-spacing: 0.05em;
  }

  /* 日付トグル */
  .date-toggle {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300;
    color: var(--ink-soft); background: var(--bg2); border: 1px solid var(--bg3);
    border-radius: 4px; padding: 4px 9px; letter-spacing: 0.04em;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .date-toggle.on { background: var(--amber-light); color: var(--amber-dark); border-color: var(--amber); }

  /* フィルタータブ */
  .filter-bar { display: flex; gap: 6px; }
  .filter-btn {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 300;
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--bg3); background: transparent; color: var(--ink-soft);
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
  }
  .filter-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .filter-btn.active.thought { background: var(--teal); border-color: var(--teal); }
  .filter-btn.active.quote { background: var(--amber); border-color: var(--amber); }

  /* PULL REFRESH */
  .pull-indicator {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    height: 0; overflow: hidden; background: var(--bg);
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 300;
    color: var(--ink-soft); letter-spacing: 0.08em; gap: 8px;
  }
  .pull-indicator.visible { height: 56px; }
  .pull-indicator.releasing { color: var(--amber); }
  .pull-spinner { width: 14px; height: 14px; border: 1.5px solid var(--bg3); border-top-color: var(--amber); border-radius: 50%; display: none; }
  .pull-indicator.refreshing .pull-spinner { display: block; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TIMELINE */
  .timeline { padding: 20px 20px 120px; display: flex; flex-direction: column; gap: 0; }

  .fragment-card {
    position: relative;
    padding: 18px 0 24px 24px;
    border-left: 1.5px solid var(--bg3);
    transition: opacity 0.2s;
  }

  .fragment-card::before {
    content: '';
    position: absolute; left: -5px; top: 22px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bg3); border: 1.5px solid var(--bg);
    transition: background 0.2s;
  }

  .fragment-card.thought::before { background: var(--teal); }
  .fragment-card.quote::before { background: var(--amber); }

  .frag-meta {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }

  .frag-type {
    font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 400;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 7px;
    border-radius: 3px;
  }
  .frag-type.thought { background: var(--teal-light); color: var(--teal); }
  .frag-type.quote   { background: var(--amber-light); color: var(--amber-dark); }

  .frag-date {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300;
    color: var(--ink-soft); letter-spacing: 0.04em;
    transition: opacity 0.3s;
  }
  .frag-date.hidden { opacity: 0; pointer-events: none; }

  /* 思考カード */
  .frag-body {
    font-size: 14px; font-weight: 300; line-height: 1.9;
    color: var(--ink);
  }

  /* 引用カード */
  .frag-quote-mark {
    font-family: 'Lora', serif; font-size: 36px; font-weight: 400;
    color: var(--amber-light); line-height: 1; margin-bottom: -4px;
    display: block;
  }

  .frag-quote-text {
    font-family: 'Lora', serif; font-size: 15px; font-weight: 400; font-style: italic;
    line-height: 1.85; color: var(--ink);
  }

  .frag-source {
    display: flex; align-items: center; gap: 6px; margin-top: 10px;
  }

  .frag-source-line {
    width: 20px; height: 1px; background: var(--amber);
  }

  .frag-source-text {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300;
    color: var(--ink-soft); letter-spacing: 0.04em;
  }

  /* カードのタップ */
  .fragment-card { cursor: pointer; }
  .fragment-card:active { opacity: 0.7; }

  .empty-state {
    text-align: center; padding: 72px 32px; color: var(--ink-soft);
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 14px; opacity: 0.4; }
  .empty-state p { font-family: 'Lora', serif; font-style: italic; font-size: 14px; line-height: 2; }

  /* FAB */
  .fab-wrap { position: fixed; bottom: calc(var(--safe-bottom) + 24px); right: 20px; z-index: 200; }
  .fab {
    width: 52px; height: 52px; border-radius: 14px; border: none;
    background: var(--ink); color: var(--white); font-size: 22px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(30,26,22,0.22); transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.9); }

  /* MODALS */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(30,26,22,0.4); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    align-items: flex-end;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    width: 100%; background: var(--bg); border-radius: 22px 22px 0 0;
    padding: 16px 20px calc(var(--safe-bottom) + 32px);
    max-height: 92vh; overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle { width: 36px; height: 3px; background: var(--bg3); border-radius: 2px; margin: 0 auto 20px; cursor: pointer; }
  .modal-title { font-family: 'Lora', serif; font-size: 16px; font-style: italic; margin-bottom: 20px; color: var(--ink); }

  /* タイプセレクター */
  .type-selector { display: flex; gap: 8px; margin-bottom: 16px; }
  .type-btn {
    flex: 1; padding: 10px; border-radius: 10px;
    border: 1.5px solid var(--bg3); background: var(--white);
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 400;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-soft); cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .type-btn.selected.thought { border-color: var(--teal); background: var(--teal-light); color: var(--teal); }
  .type-btn.selected.quote   { border-color: var(--amber); background: var(--amber-light); color: var(--amber-dark); }

  .form-group { margin-bottom: 14px; }
  .form-label {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 7px; display: block;
  }
  .form-input {
    width: 100%; border: 1px solid var(--bg3); border-radius: 10px; padding: 11px 13px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 300;
    background: var(--white); color: var(--ink); outline: none;
    transition: border-color 0.2s; -webkit-appearance: none; resize: none;
  }
  .form-input:focus { border-color: var(--amber); }
  textarea.form-input { line-height: 1.8; }
  #input-text { height: 120px; }
  #input-source { height: auto; }

  .source-group { display: none; }
  .source-group.visible { display: block; }

  .btn-save {
    width: 100%; padding: 13px; background: var(--ink); color: var(--white); border: none;
    border-radius: 10px; font-family: 'Lora', serif; font-size: 14px; font-style: italic;
    cursor: pointer; margin-top: 8px; transition: opacity 0.2s; letter-spacing: 0.02em;
  }
  .btn-save:active { opacity: 0.75; }

  /* 詳細モーダル */
  .detail-type {
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 12px; display: inline-block;
    padding: 3px 9px; border-radius: 4px;
  }
  .detail-type.thought { background: var(--teal-light); color: var(--teal); }
  .detail-type.quote   { background: var(--amber-light); color: var(--amber-dark); }

  .detail-date { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 300; color: var(--ink-soft); margin-bottom: 16px; }

  .detail-text {
    font-size: 15px; font-weight: 300; line-height: 1.9; color: var(--ink); margin-bottom: 8px;
  }
  .detail-text.is-quote { font-family: 'Lora', serif; font-style: italic; font-size: 16px; }

  .detail-source { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .detail-source-line { width: 20px; height: 1px; background: var(--amber); flex-shrink: 0; }
  .detail-source-text { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 300; color: var(--ink-soft); }

  .detail-actions { display: flex; gap: 8px; margin-top: 8px; }
  .btn-edit {
    flex: 1; padding: 12px; background: transparent; color: var(--ink-mid);
    border: 1px solid var(--bg3); border-radius: 10px;
    font-family: 'Lora', serif; font-size: 13px; font-style: italic;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-edit:active { background: var(--bg2); }
  .btn-delete {
    flex: 1; padding: 12px; background: transparent; color: var(--rose);
    border: 1px solid var(--rose); border-radius: 10px;
    font-family: 'Lora', serif; font-size: 13px; font-style: italic;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-delete.confirm-state { background: var(--rose); color: var(--white); }
</style>
</head>
<body>

<div class="pull-indicator" id="pull-indicator">
  <div class="pull-spinner"></div>
  <span id="pull-text">↓ 引っ張って更新</span>
</div>

<header class="header">
  <div class="header-top">
    <div class="header-title"><em>f</em>ragment</div>
    <div class="header-right">
      <button class="date-toggle" id="date-toggle" onclick="toggleDate()">date off</button>
      <div class="version-badge">v1</div>
    </div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">all</button>
    <button class="filter-btn thought" data-filter="thought" onclick="setFilter('thought',this)">思考</button>
    <button class="filter-btn quote" data-filter="quote" onclick="setFilter('quote',this)">引用</button>
  </div>
</header>

<div class="timeline" id="timeline"></div>

<div class="fab-wrap">
  <button class="fab" onclick="openAdd()">＋</button>
</div>

<!-- 追加/編集モーダル -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle" onclick="closeModal('add-modal')"></div>
    <div class="modal-title" id="add-modal-title">new fragment</div>

    <div class="type-selector">
      <button class="type-btn thought" id="type-thought" onclick="selectType('thought')">思考</button>
      <button class="type-btn quote"   id="type-quote"  onclick="selectType('quote')">引用</button>
    </div>

    <div class="form-group">
      <label class="form-label" id="text-label">テキスト</label>
      <textarea class="form-input" id="input-text" placeholder="書きたいことを…"></textarea>
    </div>

    <div class="form-group source-group" id="source-group">
      <label class="form-label">出典（本のタイトル、著者など）</label>
      <input type="text" class="form-input" id="input-source" placeholder="例：夜と霧、ヴィクトール・フランクル">
    </div>

    <div class="form-group">
      <label class="form-label">date</label>
      <input type="date" class="form-input" id="input-date">
    </div>

    <button class="btn-save" id="save-btn" onclick="saveFragment()">保存する</button>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle" onclick="closeModal('detail-modal')"></div>
    <div class="detail-type" id="detail-type"></div>
    <div class="detail-date" id="detail-date"></div>
    <div class="detail-text" id="detail-text"></div>
    <div class="detail-source" id="detail-source" style="display:none">
      <div class="detail-source-line"></div>
      <div class="detail-source-text" id="detail-source-text"></div>
    </div>
    <div class="detail-actions">
      <button class="btn-edit" onclick="openEditFragment()">編集</button>
      <button class="btn-delete" id="del-btn" onclick="confirmDelete()">削除</button>
    </div>
  </div>
</div>

<script>
const FK = 'fragment_v1';
let fragments = [], currentFilter = 'all', dateVisible = false;
let currentId = null, editingId = null, selectedType = 'thought';
let deleteConfirmTimer = null;

function load() {
  try { fragments = JSON.parse(localStorage.getItem(FK)) || []; } catch { fragments = []; }
}
function save() { localStorage.setItem(FK, JSON.stringify(fragments)); }

// ── フィルター ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── 日付トグル ──
function toggleDate() {
  dateVisible = !dateVisible;
  const btn = document.getElementById('date-toggle');
  btn.textContent = dateVisible ? 'date on' : 'date off';
  btn.classList.toggle('on', dateVisible);
  document.querySelectorAll('.frag-date').forEach(el => el.classList.toggle('hidden', !dateVisible));
}

// ── レンダリング ──
function render() {
  const list = currentFilter === 'all' ? fragments
    : fragments.filter(f => f.type === currentFilter);
  const sorted = [...list].sort((a, b) => b.date.localeCompare(a.date));
  const tl = document.getElementById('timeline');

  if (!sorted.length) {
    tl.innerHTML = `<div class="empty-state"><div class="icon">${currentFilter==='quote'?'❝':'✦'}</div><p>${currentFilter==='quote'?'好きな言葉を<br>貯めていこう':'思考の欠片を<br>ここに残しておこう'}</p></div>`;
    return;
  }

  tl.innerHTML = sorted.map(f => {
    const dateHidden = dateVisible ? '' : 'hidden';
    if (f.type === 'thought') {
      return `<div class="fragment-card thought" onclick="openDetail('${f.id}')">
        <div class="frag-meta">
          <span class="frag-type thought">思考</span>
          <span class="frag-date ${dateHidden}">${f.date}</span>
        </div>
        <div class="frag-body">${escHTML(f.text)}</div>
      </div>`;
    } else {
      const src = f.source ? `<div class="frag-source"><div class="frag-source-line"></div><span class="frag-source-text">${escHTML(f.source)}</span></div>` : '';
      return `<div class="fragment-card quote" onclick="openDetail('${f.id}')">
        <div class="frag-meta">
          <span class="frag-type quote">引用</span>
          <span class="frag-date ${dateHidden}">${f.date}</span>
        </div>
        <span class="frag-quote-mark">"</span>
        <div class="frag-quote-text">${escHTML(f.text)}</div>
        ${src}
      </div>`;
    }
  }).join('');
}

// ── タイプ選択 ──
function selectType(type) {
  selectedType = type;
  document.getElementById('type-thought').classList.toggle('selected', type === 'thought');
  document.getElementById('type-quote').classList.toggle('selected', type === 'quote');
  document.getElementById('source-group').classList.toggle('visible', type === 'quote');
  document.getElementById('text-label').textContent = type === 'quote' ? '引用テキスト' : 'テキスト';
  document.getElementById('input-text').placeholder = type === 'quote' ? '引用したい言葉を…' : '書きたいことを…';
}

// ── 追加 ──
function openAdd() {
  editingId = null;
  selectedType = 'thought';
  document.getElementById('add-modal-title').textContent = 'new fragment';
  document.getElementById('save-btn').textContent = '保存する';
  document.getElementById('input-text').value = '';
  document.getElementById('input-source').value = '';
  document.getElementById('input-date').value = toDateStr(new Date());
  document.getElementById('type-thought').classList.add('selected');
  document.getElementById('type-quote').classList.remove('selected');
  document.getElementById('source-group').classList.remove('visible');
  document.getElementById('text-label').textContent = 'テキスト';
  document.getElementById('add-modal').classList.add('open');
}

function saveFragment() {
  const text = document.getElementById('input-text').value.trim();
  if (!text) { alert('テキストを入力してください'); return; }
  const date = document.getElementById('input-date').value || toDateStr(new Date());
  const source = document.getElementById('input-source').value.trim();
  const data = { type: selectedType, text, source: selectedType === 'quote' ? source : '', date };

  if (editingId) {
    const idx = fragments.findIndex(f => f.id === editingId);
    if (idx !== -1) fragments[idx] = { ...fragments[idx], ...data };
  } else {
    fragments.unshift({ id: Date.now().toString(), ...data, createdAt: new Date().toISOString() });
  }
  save();
  closeModal('add-modal');
  render();
}

// ── 詳細 ──
function openDetail(id) {
  const f = fragments.find(x => x.id === id);
  if (!f) return;
  currentId = id;

  const typeEl = document.getElementById('detail-type');
  typeEl.textContent = f.type === 'thought' ? '思考' : '引用';
  typeEl.className = `detail-type ${f.type}`;

  document.getElementById('detail-date').textContent = f.date;

  const textEl = document.getElementById('detail-text');
  textEl.textContent = f.text;
  textEl.className = `detail-text${f.type === 'quote' ? ' is-quote' : ''}`;

  const srcWrap = document.getElementById('detail-source');
  if (f.source) {
    document.getElementById('detail-source-text').textContent = f.source;
    srcWrap.style.display = 'flex';
  } else {
    srcWrap.style.display = 'none';
  }

  const db = document.getElementById('del-btn');
  db.classList.remove('confirm-state');
  db.textContent = '削除';

  document.getElementById('detail-modal').classList.add('open');
}

// ── 編集 ──
function openEditFragment() {
  const f = fragments.find(x => x.id === currentId);
  if (!f) return;
  editingId = f.id;
  document.getElementById('add-modal-title').textContent = 'edit fragment';
  document.getElementById('save-btn').textContent = '更新する';
  document.getElementById('input-text').value = f.text;
  document.getElementById('input-source').value = f.source || '';
  document.getElementById('input-date').value = f.date;
  selectType(f.type);
  closeModal('detail-modal');
  document.getElementById('add-modal').classList.add('open');
}

// ── 削除 ──
function confirmDelete() {
  const btn = document.getElementById('del-btn');
  if (btn.classList.contains('confirm-state')) {
    clearTimeout(deleteConfirmTimer);
    fragments = fragments.filter(f => f.id !== currentId);
    save();
    closeModal('detail-modal');
    render();
  } else {
    btn.classList.add('confirm-state');
    btn.textContent = '本当に削除';
    deleteConfirmTimer = setTimeout(() => {
      btn.classList.remove('confirm-state');
      btn.textContent = '削除';
    }, 3000);
  }
}

// ── utils ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function escHTML(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ── プルリフレッシュ ──
(function(){
  let startY=0, pulling=false, threshold=72;
  const ind=document.getElementById('pull-indicator');
  const txt=document.getElementById('pull-text');
  document.addEventListener('touchstart',e=>{ if(window.scrollY===0){startY=e.touches[0].clientY;pulling=true;} },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pulling) return;
    const dy=e.touches[0].clientY-startY; if(dy<=0){pulling=false;return;}
    ind.style.height=(Math.min(dy/threshold,1)*56)+'px';
    ind.classList.toggle('visible',dy>20);
    if(dy>=threshold){ind.classList.add('releasing');txt.textContent='↑ 離して更新';}
    else{ind.classList.remove('releasing');txt.textContent='↓ 引っ張って更新';}
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!pulling) return; pulling=false;
    const dy=e.changedTouches[0].clientY-startY;
    if(dy>=threshold){
      ind.classList.add('refreshing','visible'); ind.style.height='56px'; txt.textContent='更新中…';
      setTimeout(()=>{ load(); render(); ind.classList.remove('refreshing','releasing','visible'); ind.style.height='0'; txt.textContent='↓ 引っ張って更新'; },700);
    } else { ind.classList.remove('visible','releasing'); ind.style.height='0'; }
  },{passive:true});
})();

load();
render();
</script>
</body>
</html>
